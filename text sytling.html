<!DOCTYPE html>
<center>

<head>
    <Title>My Superhero Card</Title>
     <style>
    body {
        background-color: rgb(20, 54, 7);
        color: cyan;
            font-family:lorem, sans-serif;}
    .hero {
        font-size: 60px;
        font-weight: bold;
        color: rgba(17, 228, 130, 0.822);
        text-shadow: 3px 3px 4px rgba(0, 0, 0, 0.5);}

        .tagline{font-style: italic;
        color: darkyellow;
        text-transform: capitalize;}

        .Label{
            text-transform: uppercase;
            text-decoration: underline;
            color: coral;
        }

        .power{
            font-weight: bold;
            color: lightblue;
        }

        .weaknesses{
            text-decoration: line-through;
            color: rgb(49, 2, 2)
        }

        .made by{
            font-style: long, papyrus;
            color: rgb(223, 83, 107)
        }

        .badge{
            transform: rotate(15deg)
        }
        </style>
</head>
<body>
     <h1 class="hero">Hero Boy</h1>
    <p class="tagline">He has wonderful powers.</p>

     <h2 class="Label">His powers</h2>
    <p class="power">He can fly.</p>
    <p class="power">He can run faster than a car.</p>
    <p class="power">He can hold his breath for longer than a whale</p>

        <h3 class="weaknesses">Weaknesses</h3>
        <p class="weaknesses">He hates ice cream.</p>
        <p class="weaknesses">He hates spiders.</p>

        <p class="badge">Superhero!</p>
        <p class="made by"> Made by Ali!</p>
</body>
</center>
</html>
