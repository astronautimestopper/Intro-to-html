<DOCTYPE! html>

<head>
    <Title>|Forms In Html</Title>
</head>

<body>
<form>
    <fieldset>
    <legend>Personal details</legend>
    <center>
    <lable>Name</lable><br><strong>
    <input type="text" id="name"><br>

    
     <lable>Email</lable><br><strong>
    <input type="email" id="email"><br>

      
     <lable>Phone number</lable><br><strong>
    <input type="password" id="contact"><br>

    <lable>Gender</lable><br><strong>
    <input type="radio" id="female" name="gender" value="female">female<br>
     <input type="radio" id="male" name="gender" value="male">male<br>


    <lable>Favourite Country</lable><br><strong>
        <input type="checkbox" id="country" value= Spain>Spain<br>
        <input type="checkbox" id="country" value= Brazil>Brazil<br>
        <input type="checkbox" id="country" value= Curaco>Curaco<br>
        <input type="checkbox" id="country" value= Kenya>Kenya<br>

        <label>When is your birthday</label>
        <input type="date" id="birthday" name="birthday"><br>
    </fieldset>
 </form>
</body>
</html>
