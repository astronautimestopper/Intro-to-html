<!DOCTYPE html>
<head>
    <title>Listing in html</title>
</head>
<body>
    <h1>Shopping list</h1>
    <ol>
        <li>Avocadoes</li>
        <li>Kiwi</li>
        <li>Carrots</li>
    </ol>

    <h2>Needed list</h2>
    <ul>
        <li>Apples</li>
        <li>Bananas</li>
        <li>Plums</li>
    </ul>

    <h3>Definitions list</h3>
    <d1>
        <dt>Falcon</dt>
        <dd>A type or bird of prey</dd>
    </d1>
</body>
</html>
